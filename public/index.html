<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <title>Clocktower Night Assist</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0b;
      --panel: #0b0b0b;
      --text: #e6e6e6;
      --muted: #8e8e8e;
      --line: #6b6b6b;
      --red: #c94a4a;
      --white: #e6e6e6;
      --black: #0b0b0b;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      font-size: 16px;
      line-height: 1.35;
    }

    button,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--black);
      color: var(--text);
      min-height: 44px;
      padding: 0.66rem 0.82rem;
      font-weight: 700;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(1px);
    }

    .app {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      gap: 0.8rem;
      padding: max(1rem, env(safe-area-inset-top)) 1rem 0.85rem;
      border-bottom: 1px solid var(--line);
      background: var(--black);
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 1.12rem;
      letter-spacing: 0;
      font-weight: 800;
    }

    .status {
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .tabs,
    .segments,
    .script-row {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.1rem;
      scrollbar-width: none;
    }

    .night-options {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .player-count {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      white-space: nowrap;
    }

    .player-count select {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--black);
      color: var(--text);
      padding: 0.45rem 1.8rem 0.45rem 0.65rem;
    }

    .tabs::-webkit-scrollbar,
    .segments::-webkit-scrollbar,
    .script-row::-webkit-scrollbar {
      display: none;
    }

    .tab,
    .segment,
    .script-chip {
      flex: 0 0 auto;
      color: var(--text);
      background: var(--black);
    }

    .tab[aria-selected="true"],
    .segment[aria-pressed="true"],
    .script-chip[aria-pressed="true"] {
      color: var(--red);
      background: var(--black);
    }

    main {
      min-width: 0;
    }

    .view {
      display: none;
      padding: 1rem;
    }

    .view.active {
      display: block;
    }

    .setup {
      max-width: 1040px;
      margin: 0 auto;
      display: grid;
      gap: 1rem;
    }

    .section {
      display: grid;
      gap: 0.72rem;
      padding: 0.95rem 0;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child {
      border-bottom: 0;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
    }

    .section h2 {
      font-size: 1rem;
      font-weight: 800;
    }

    .small {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .role-groups {
      display: grid;
      gap: 0.9rem;
    }

    .role-group {
      display: grid;
      gap: 0.52rem;
    }

    .role-group h3 {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .roles {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.5rem;
    }

    .role {
      min-width: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.62rem;
      align-items: center;
      min-height: 3.25rem;
      padding: 0.62rem;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel);
    }

    .role:has(input:checked) {
      background: var(--black);
      color: var(--red);
    }

    .role input {
      width: 1.15rem;
      height: 1.15rem;
      margin: 0;
      accent-color: var(--red);
    }

    .role strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 0.95rem;
      line-height: 1.05;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .primary {
      background: var(--black);
      color: var(--red);
    }

    .danger {
      background: var(--black);
    }

    .full {
      grid-column: 1 / -1;
    }

    textarea {
      width: 100%;
      min-height: 11rem;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--black);
      color: var(--text);
      padding: 0.8rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .deck-view {
      min-height: calc(100svh - 8.7rem);
      display: none;
      grid-template-rows: 1fr auto;
      padding: 0;
    }

    .deck-view.active {
      display: grid;
    }

    .deck {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: var(--black);
      touch-action: pan-y;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: 1fr;
      gap: 1rem;
      padding: 1rem 1rem max(1rem, env(safe-area-inset-bottom));
      opacity: 0;
      transform: translateX(12px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      background: var(--black);
      color: var(--white);
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .slide.special {
      background: var(--black);
      color: var(--text);
    }

    .slide.special .action {
      color: var(--red);
    }

    .slide-main {
      min-width: 0;
      align-self: center;
      display: grid;
      gap: 1rem;
    }

    .slide h2 {
      display: none;
    }

    .slide .action {
      max-width: 18ch;
      font-size: clamp(2rem, 12vw, 6rem);
      line-height: 1.05;
      font-weight: 800;
    }

    .slide .detail {
      max-width: 58ch;
      color: currentColor;
      opacity: 0.78;
      font-size: clamp(1rem, 4.1vw, 1.6rem);
      line-height: 1.2;
    }

    .deck-controls {
      display: grid;
      grid-template-columns: 3.3rem 4.7rem 1fr 3.3rem;
      gap: 0.7rem;
      align-items: center;
      padding: 0.72rem 1rem max(0.72rem, env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: var(--black);
    }

    .deck-controls button {
      min-width: 0;
      padding-inline: 0;
      font-size: 1.3rem;
      font-weight: 800;
    }

    .progress {
      display: grid;
      gap: 0.34rem;
      min-width: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .bar {
      height: 0.42rem;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--black);
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--muted);
    }

    .empty {
      padding: 3rem 1rem;
      color: var(--muted);
      text-align: center;
    }

    @media (min-width: 720px) {
      header {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .tabs {
        justify-content: flex-end;
      }

      .roles {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .controls {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .deck-view {
        min-height: calc(100svh - 5.25rem);
      }

      .slide {
        padding: 2rem 2.4rem;
      }
    }

    @media (min-width: 1080px) {
      .roles {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topline">
        <h1>Clocktower Night Assist</h1>
        <div class="status" id="status">No deck</div>
      </div>
      <nav class="tabs" aria-label="Views">
        <button class="tab" type="button" data-view="setup" aria-selected="true">Setup</button>
        <button class="tab" type="button" data-view="deck" aria-selected="false">Deck</button>
        <button class="tab" type="button" data-action="export">Export HTML</button>
      </nav>
    </header>

    <main>
      <section class="view active" id="setupView">
        <div class="setup">
          <div class="section">
            <div class="section-head">
              <h2>Script</h2>
              <span class="small" id="scriptMeta"></span>
            </div>
            <div class="script-row" id="scriptRow"></div>
          </div>

          <div class="section">
            <div class="section-head">
              <h2>Night</h2>
              <span class="small" id="nightMeta"></span>
            </div>
            <div class="night-options">
              <div class="segments" aria-label="Night phase">
                <button class="segment" type="button" data-phase="first" aria-pressed="true">First night</button>
                <button class="segment" type="button" data-phase="other" aria-pressed="false">Rest of nights</button>
              </div>
              <label class="player-count small">Players
                <select id="playerCount" aria-label="Player count">
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7" selected>7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                  <option value="11">11</option>
                  <option value="12">12</option>
                  <option value="13">13</option>
                  <option value="14">14</option>
                  <option value="15">15</option>
                </select>
              </label>
            </div>
          </div>

          <div class="section">
            <div class="section-head">
              <h2>Active roles</h2>
              <span class="small" id="roleCount"></span>
            </div>
            <div class="controls">
              <button type="button" data-action="select-defaults">Select script</button>
              <button type="button" data-action="clear">Clear</button>
              <button class="primary" type="button" data-action="generate">Generate deck</button>
              <button type="button" data-action="copy-link">Copy state link</button>
            </div>
            <div class="role-groups" id="roleGroups"></div>
          </div>

          <details class="section">
            <summary><strong>Custom script JSON</strong></summary>
            <p class="small">Paste JSON exported by the official Blood on the Clocktower Script Tool. Script metadata, built-in IDs, and homebrew role definitions are supported.</p>
            <textarea id="customJson" spellcheck="false" placeholder='[{"id":"_meta","name":"My Script","author":"Storyteller"},"washerwoman","librarian","imp"]'></textarea>
            <div class="controls">
              <button class="primary full" type="button" data-action="load-custom">Load custom script</button>
            </div>
          </details>
        </div>
      </section>

      <section class="deck-view" id="deckView" aria-live="polite">
        <div class="deck" id="deck"></div>
        <div class="deck-controls">
          <button type="button" data-action="previous" aria-label="Previous slide">&#8249;</button>
          <button type="button" data-action="reset">Reset</button>
          <div class="progress">
            <div id="progressLabel">0 / 0</div>
            <div class="bar"><span id="progressBar"></span></div>
          </div>
          <button type="button" data-action="next" aria-label="Next slide">&#8250;</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const TEAMS = ["Townsfolk", "Outsider", "Minion", "Demon", "Traveler", "Fabled"];

    let ROLE_DATA = {};
    let SCRIPTS = [];
    let ROLE_ALIASES = {};
    const state = {
      scriptId: "",
      phase: "first",
      playerCount: 7,
      selected: new Set(),
      slides: [],
      slideIndex: 0
    };
    let slideSequence = 0;

    const els = {
      status: document.querySelector("#status"),
      scriptRow: document.querySelector("#scriptRow"),
      scriptMeta: document.querySelector("#scriptMeta"),
      nightMeta: document.querySelector("#nightMeta"),
      playerCount: document.querySelector("#playerCount"),
      roleCount: document.querySelector("#roleCount"),
      roleGroups: document.querySelector("#roleGroups"),
      setupView: document.querySelector("#setupView"),
      deckView: document.querySelector("#deckView"),
      deck: document.querySelector("#deck"),
      progressLabel: document.querySelector("#progressLabel"),
      progressBar: document.querySelector("#progressBar"),
      customJson: document.querySelector("#customJson")
    };

    initialize();

    document.addEventListener("click", (event) => {
      if (!SCRIPTS.length) return;
      const button = event.target.closest("button");
      if (!button) return;

      const view = button.dataset.view;
      const action = button.dataset.action;
      const phase = button.dataset.phase;
      const scriptId = button.dataset.script;

      if (view) setView(view);
      if (phase) setPhase(phase);
      if (scriptId) setScript(scriptId);
      if (action) runAction(action);
    });

    document.addEventListener("change", (event) => {
      if (!SCRIPTS.length) return;
      if (event.target === els.playerCount) {
        state.playerCount = Number(els.playerCount.value);
        renderPhase();
        persist();
        generateDeck(true);
        return;
      }
      const input = event.target.closest("input[data-role]");
      if (!input) return;
      if (input.checked) state.selected.add(input.dataset.role);
      else state.selected.delete(input.dataset.role);
      persist();
      renderCounts();
      generateDeck(false);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") moveSlide(1);
      if (event.key === "ArrowLeft") moveSlide(-1);
    });

    let touchStartX = 0;
    let touchStartY = 0;
    els.deck.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    els.deck.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      if (Math.abs(dx) > 42 && Math.abs(dx) > Math.abs(dy) * 1.2) {
        moveSlide(dx < 0 ? 1 : -1);
      }
    }, { passive: true });

    async function initialize() {
      els.status.textContent = "Loading data";
      try {
        const config = await loadJson("/data/scripts.json");
        validateConfig(config);
        ROLE_ALIASES = config.aliases || {};

        const roleLists = await Promise.all(config.scripts.map((item) => loadJson(item.rolesFile)));
        const roleEntries = roleLists.flat();
        const roleIds = new Set();
        ROLE_DATA = Object.fromEntries(roleEntries.map((item) => {
          validateRole(item);
          if (roleIds.has(item.id)) throw new Error(`Duplicate role id: ${item.id}`);
          roleIds.add(item.id);
          const { id, ...roleItem } = item;
          return [id, roleItem];
        }));

        const scriptDocuments = await Promise.all(config.scripts.map((item) => loadJson(item.scriptFile)));
        SCRIPTS = scriptDocuments.map((document, index) => {
          const parsed = parseScriptToolScript(document, config.scripts[index]);
          return parsed.script;
        });
        validateReferences();

        hydrateFromUrl();
        renderAll();
        generateDeck(false);
      } catch (error) {
        console.error(error);
        els.status.textContent = "Role data failed to load";
        els.roleGroups.innerHTML = `<p class="small">${escapeHtml(error.message)}</p>`;
      }
    }

    async function loadJson(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Could not load ${url} (${response.status})`);
      return response.json();
    }

    function validateConfig(config) {
      if (!config || !Array.isArray(config.scripts) || !config.scripts.length) {
        throw new Error("scripts.json must define at least one script");
      }
      config.scripts.forEach((item) => {
        if (!item.id || !item.scriptFile || !item.rolesFile) {
          throw new Error("Each script needs an id, scriptFile, and rolesFile");
        }
      });
    }

    function parseScriptToolScript(document, source = {}) {
      if (!Array.isArray(document)) throw new Error("Script Tool JSON must be an array");
      const metadata = document.find((entry) => entry && typeof entry === "object" && entry.id === "_meta") || {};
      const roles = [];
      const customRoles = [];

      document.forEach((entry) => {
        if (entry && typeof entry === "object" && entry.id === "_meta") return;
        const rawId = typeof entry === "string" ? entry : entry && entry.id;
        if (!rawId) return;
        const id = normalizeId(rawId);
        if (!id || roles.includes(id)) return;
        roles.push(id);

        if (entry && typeof entry === "object" && entry.name && entry.team && entry.ability) {
          customRoles.push(importedRole(id, entry));
        }
      });

      return {
        script: {
          id: source.id || `custom-${Date.now()}`,
          name: metadata.name || source.name || "Custom Script",
          author: metadata.author || "",
          roles,
          firstNightOrder: normalizeNightOrder(metadata.firstNight),
          otherNightOrder: normalizeNightOrder(metadata.otherNight)
        },
        customRoles
      };
    }

    function importedRole(id, entry) {
      const teams = {
        townsfolk: "Townsfolk",
        outsider: "Outsider",
        minion: "Minion",
        demon: "Demon",
        traveler: "Traveler",
        traveller: "Traveler",
        fabled: "Fabled"
      };
      const team = teams[String(entry.team).toLowerCase()];
      if (!team) throw new Error(`Invalid team for custom role ${id}`);
      return {
        id,
        name: entry.name,
        team,
        first: importedInstruction(entry.name, entry.firstNight, entry.firstNightReminder, entry.ability),
        other: importedInstruction(entry.name, entry.otherNight, entry.otherNightReminder, entry.ability)
      };
    }

    function importedInstruction(name, order, reminder, ability) {
      const numericOrder = Number(order);
      if (!Number.isFinite(numericOrder) || numericOrder <= 0) return null;
      return {
        order: numericOrder,
        action: `Run the ${name}.`,
        detail: reminder || ability
      };
    }

    function normalizeNightOrder(order) {
      return Array.isArray(order) ? order.map(normalizeId) : null;
    }

    function validateRole(item) {
      if (!item || !item.id || !item.name || !TEAMS.includes(item.team)) {
        throw new Error(`Invalid role entry: ${item && item.id || "unknown"}`);
      }
      ["first", "other"].forEach((phase) => {
        const instruction = item[phase];
        if (instruction === null) return;
        if (!instruction || !Number.isFinite(instruction.order) || instruction.order <= 0 || !instruction.action || !instruction.detail) {
          throw new Error(`Invalid ${phase}-night instruction for ${item.id}`);
        }
      });
    }

    function validateReferences() {
      const missing = SCRIPTS.flatMap((item) => item.roles.filter((id) => !ROLE_DATA[id]));
      if (missing.length) throw new Error(`Missing role data: ${[...new Set(missing)].join(", ")}`);
    }

    function currentScript() {
      return SCRIPTS.find((item) => item.id === state.scriptId) || SCRIPTS[0];
    }

    function renderAll() {
      renderScripts();
      renderPhase();
      renderRoles();
      renderCounts();
    }

    function renderScripts() {
      els.scriptRow.innerHTML = SCRIPTS.map((item) => `
        <button class="script-chip" type="button" data-script="${item.id}" aria-pressed="${item.id === state.scriptId}">
          ${escapeHtml(item.name)}
        </button>
      `).join("");
      els.scriptMeta.textContent = `${currentScript().roles.length} roles`;
    }

    function renderPhase() {
      document.querySelectorAll("[data-phase]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.phase === state.phase));
      });
      els.playerCount.value = String(state.playerCount);
      els.nightMeta.textContent = `${state.playerCount} players`;
    }

    function renderRoles() {
      const roles = currentScript().roles.map((id) => [id, ROLE_DATA[id] || unknownRole(id)]);
      els.roleGroups.innerHTML = TEAMS.map((team) => {
        const teamRoles = roles.filter(([, roleItem]) => roleItem.team === team);
        if (!teamRoles.length) return "";
        return `
          <div class="role-group">
            <h3>${team}</h3>
            <div class="roles">
              ${teamRoles.map(([id, roleItem]) => roleCheckbox(id, roleItem)).join("")}
            </div>
          </div>
        `;
      }).join("");
    }

    function roleCheckbox(id, roleItem) {
      const checked = state.selected.has(id) ? "checked" : "";
      return `
        <label class="role">
          <input type="checkbox" data-role="${id}" ${checked} />
          <strong>${escapeHtml(roleItem.name)}</strong>
        </label>
      `;
    }

    function renderCounts() {
      const active = currentScript().roles.filter((id) => state.selected.has(id)).length;
      els.roleCount.textContent = `${active} selected`;
      els.status.textContent = state.slides.length ? `${state.slides.length} slides` : "No deck";
    }

    function setView(view) {
      document.querySelectorAll("[data-view]").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.view === view));
      });
      els.setupView.classList.toggle("active", view === "setup");
      els.deckView.classList.toggle("active", view === "deck");
    }

    function setPhase(phase) {
      state.phase = phase;
      renderPhase();
      renderRoles();
      persist();
      generateDeck(true);
    }

    function setScript(scriptId) {
      state.scriptId = scriptId;
      const scriptItem = currentScript();
      state.selected = new Set(scriptItem.roles);
      state.slideIndex = 0;
      renderAll();
      persist();
      generateDeck(false);
    }

    function runAction(action) {
      if (action === "select-defaults") {
        state.selected = new Set(currentScript().roles);
        renderRoles();
        renderCounts();
        persist();
        generateDeck(false);
      }
      if (action === "clear") {
        state.selected.clear();
        renderRoles();
        renderCounts();
        persist();
        generateDeck(false);
      }
      if (action === "generate") {
        generateDeck(true);
        setView("deck");
      }
      if (action === "previous") moveSlide(-1);
      if (action === "next") moveSlide(1);
      if (action === "reset") resetDeck();
      if (action === "copy-link") copyStateLink();
      if (action === "export") exportDeck();
      if (action === "load-custom") loadCustomScript();
    }

    function generateDeck(resetIndex) {
      slideSequence = 0;
      const scriptItem = currentScript();
      const selected = scriptItem.roles.filter((id) => state.selected.has(id));
      const roles = selected.map((id) => ({ id, ...(ROLE_DATA[id] || unknownRole(id)) }));
      const slides = [];
      const minions = roles.filter((item) => item.team === "Minion");
      const demons = roles.filter((item) => item.team === "Demon");

      if (state.phase === "first" && state.playerCount > 6) {
        if (minions.length) {
          const minionInfoOrder = nightOrderFor(scriptItem, "first", "minioninfo", 5);
          slides.push(orderedSlide(minionInfoOrder, instructionSlide("Minions", "Wake up the Minions", "Have all Minions open their eyes.")));
          slides.push(orderedSlide(minionInfoOrder, specialSlide("Minions", "You are Minions", "If there is more than one Minion, show them each other.")));
          if (demons.length) {
            slides.push(orderedSlide(minionInfoOrder, specialSlide("Demon", "THIS IS YOUR DEMON", "Point to the Demon.")));
          }
        }
        if (demons.length) {
          const demonInfoOrder = nightOrderFor(scriptItem, "first", "demoninfo", 8);
          slides.push(orderedSlide(demonInfoOrder, instructionSlide("Demon", "Wake up the Demon", "Have the Demon open their eyes.")));
          slides.push(orderedSlide(demonInfoOrder, specialSlide("Minions", "These are your Minions", minions.length ? "Point to the Minions, then show three good character tokens that are not in play." : "Show that there are no Minions, then show three good character tokens that are not in play.")));
        }
      }

      roles
        .filter((item) => item[state.phase])
        .forEach((item) => {
          const instruction = item[state.phase];
          const order = nightOrderFor(scriptItem, state.phase, item.id, instruction.order);
          slides.push({
            kind: "role",
            title: item.name,
            label: `${state.phase === "first" ? "First night" : "Rest of nights"} - ${scriptItem.name}`,
            action: instruction.action,
            detail: instruction.detail,
            order,
            sequence: slideSequence++,
            footer: `${item.team} - order ${order}`
          });
        });

      slides.sort((a, b) => a.order - b.order || a.sequence - b.sequence || a.title.localeCompare(b.title));

      if (!slides.length) {
        slides.push(specialSlide("No Wakes", "No active night actions", "Change the phase or select roles with night actions."));
      }

      state.slides = slides;
      if (resetIndex) state.slideIndex = 0;
      state.slideIndex = clamp(state.slideIndex, 0, slides.length - 1);
      renderDeck();
      renderCounts();
    }

    function specialSlide(title, action, detail) {
      return {
        kind: "special",
        title,
        label: "Storyteller instruction",
        action,
        detail,
        footer: "High-contrast information slide"
      };
    }

    function instructionSlide(title, action, detail) {
      return {
        kind: "role",
        title,
        label: "Storyteller instruction",
        action,
        detail,
        footer: "Night setup"
      };
    }

    function orderedSlide(order, slide) {
      return { ...slide, order, sequence: slideSequence++ };
    }

    function nightOrderFor(scriptItem, phase, id, fallback) {
      const order = scriptItem[phase === "first" ? "firstNightOrder" : "otherNightOrder"];
      const index = order ? order.indexOf(id) : -1;
      return index >= 0 ? index + 1 : fallback;
    }

    function renderDeck() {
      els.deck.innerHTML = state.slides.map((slide, index) => `
        <article class="slide ${slide.kind === "special" ? "special" : ""} ${index === state.slideIndex ? "active" : ""}">
          <div class="slide-main">
            <p class="action">${escapeHtml(slide.action)}</p>
            <p class="detail">${escapeHtml(slide.detail)}</p>
          </div>
        </article>
      `).join("");
      els.progressLabel.textContent = `${state.slideIndex + 1} / ${state.slides.length}`;
      els.progressBar.style.width = `${((state.slideIndex + 1) / state.slides.length) * 100}%`;
    }

    function moveSlide(delta) {
      if (!state.slides.length) return;
      state.slideIndex = clamp(state.slideIndex + delta, 0, state.slides.length - 1);
      renderDeck();
    }

    function resetDeck() {
      if (!state.slides.length) return;
      state.slideIndex = 0;
      renderDeck();
    }

    function loadCustomScript() {
      let document;
      try {
        document = JSON.parse(els.customJson.value);
      } catch (error) {
        alert("The custom script JSON could not be parsed.");
        return;
      }
      let parsed;
      try {
        parsed = parseScriptToolScript(document);
      } catch (error) {
        alert(error.message);
        return;
      }
      if (!parsed.script.roles.length) {
        alert("No role IDs were found.");
        return;
      }
      parsed.customRoles.forEach((item) => {
        if (!ROLE_DATA[item.id]) {
          const { id, ...roleItem } = item;
          ROLE_DATA[id] = roleItem;
        }
      });
      parsed.script.roles.forEach((id) => {
        if (!ROLE_DATA[id]) ROLE_DATA[id] = unknownRole(id);
      });
      SCRIPTS.push(parsed.script);
      state.scriptId = SCRIPTS[SCRIPTS.length - 1].id;
      state.selected = new Set(parsed.script.roles);
      state.slideIndex = 0;
      renderAll();
      persist();
      generateDeck(false);
    }

    async function copyStateLink() {
      const params = new URLSearchParams();
      params.set("script", state.scriptId);
      params.set("phase", state.phase);
      params.set("players", String(state.playerCount));
      params.set("roles", [...state.selected].join(","));
      const url = `${location.origin}${location.pathname}?${params.toString()}`;
      try {
        await navigator.clipboard.writeText(url);
        els.status.textContent = "Link copied";
      } catch (error) {
        prompt("Copy state link", url);
      }
    }

    function exportDeck() {
      generateDeck(false);
      const html = standaloneHtml(state.slides, currentScript().name, state.phase);
      const blob = new Blob([html], { type: "text/html" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `clocktower-${currentScript().id}-${state.phase}-deck.html`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function standaloneHtml(slides, scriptName, phase) {
      const slideJson = JSON.stringify(slides).replace(/</g, "\\u003c");
      return `<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>${escapeHtml(scriptName)} ${phase} deck</title>
<style>${document.querySelector("style").textContent}</style>
</head>
<body>
<div class="deck-view active" style="min-height:100svh">
  <div class="deck" id="deck"></div>
  <div class="deck-controls">
    <button type="button" id="prev" aria-label="Previous slide">&#8249;</button>
    <button type="button" id="reset">Reset</button>
    <div class="progress"><div id="progressLabel"></div><div class="bar"><span id="progressBar"></span></div></div>
    <button type="button" id="next" aria-label="Next slide">&#8250;</button>
  </div>
</div>
<script>
const slides=${slideJson};let slideIndex=0;
const deck=document.querySelector("#deck"), label=document.querySelector("#progressLabel"), bar=document.querySelector("#progressBar");
function escapeHtml(value){return String(value).replace(/[&<>"']/g,(char)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]));}
function render(){deck.innerHTML=slides.map((slide,index)=>\`<article class="slide \${slide.kind==="special"?"special":""} \${index===slideIndex?"active":""}"><div class="slide-main"><p class="action">\${escapeHtml(slide.action)}</p><p class="detail">\${escapeHtml(slide.detail)}</p></div></article>\`).join("");label.textContent=\`\${slideIndex+1} / \${slides.length}\`;bar.style.width=\`\${((slideIndex+1)/slides.length)*100}%\`;}
function move(delta){slideIndex=Math.max(0,Math.min(slides.length-1,slideIndex+delta));render();}
document.querySelector("#prev").addEventListener("click",()=>move(-1));document.querySelector("#next").addEventListener("click",()=>move(1));document.querySelector("#reset").addEventListener("click",()=>{slideIndex=0;render();});
document.addEventListener("keydown",(event)=>{if(event.key==="ArrowRight")move(1);if(event.key==="ArrowLeft")move(-1);});
let sx=0,sy=0;deck.addEventListener("touchstart",(event)=>{const t=event.changedTouches[0];sx=t.clientX;sy=t.clientY;},{passive:true});deck.addEventListener("touchend",(event)=>{const t=event.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(Math.abs(dx)>42&&Math.abs(dx)>Math.abs(dy)*1.2)move(dx<0?1:-1);},{passive:true});
render();
<\/script>
</body>
</html>`;
    }

    function persist() {
      const value = {
        scriptId: state.scriptId,
        phase: state.phase,
        playerCount: state.playerCount,
        selected: [...state.selected]
      };
      localStorage.setItem("clocktower-night-assist", JSON.stringify(value));
    }

    function hydrateFromUrl() {
      let saved = null;
      try {
        saved = JSON.parse(localStorage.getItem("clocktower-night-assist") || "null");
      } catch (error) {
        saved = null;
      }

      const params = new URLSearchParams(location.search);
      const scriptId = params.get("script") || (saved && saved.scriptId);
      const phase = params.get("phase") || (saved && saved.phase);
      const playerCount = Number(params.get("players") || (saved && saved.playerCount) || 7);
      const roles = params.get("roles") ? params.get("roles").split(",") : saved && saved.selected;

      if (!SCRIPTS.some((item) => item.id === state.scriptId)) state.scriptId = SCRIPTS[0].id;
      if (scriptId && SCRIPTS.some((item) => item.id === scriptId)) state.scriptId = scriptId;
      if (phase === "first" || phase === "other") state.phase = phase;
      if (playerCount >= 5 && playerCount <= 15) state.playerCount = playerCount;
      state.selected = Array.isArray(roles)
        ? new Set(roles.map(normalizeId))
        : new Set(currentScript().roles);
    }

    function normalizeId(value) {
      const id = String(value).trim().toLowerCase().replace(/[\s-]+/g, "_").replace(/[^a-z0-9_]/g, "");
      return ROLE_ALIASES[id] || id;
    }

    function unknownRole(id) {
      return {
        name: titleize(id),
        team: "Townsfolk",
        first: null,
        other: null
      };
    }

    function titleize(id) {
      return String(id).replace(/_/g, " ").replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>
